# Fly.io config — Backend (Express API)
app = "lastmart-backend"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV    = "production"
  PORT        = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory      = "512mb"
  cpu_kind    = "shared"
  cpus        = 1

[mounts]
  source      = "lastmart_data"
  destination = "/data"
