## ─── LastMart — Render Deployment Configuration ─────────────────────────────
## Defines 5 services: 1 backend API + 4 frontend Next.js apps
## Deploy: connect this repo to Render and it will auto-create all services.
##
## Secrets to set in Render Dashboard (per service):
##   Backend:  JWT_SECRET, PAYSTACK_SECRET_KEY, FLUTTERWAVE_SECRET_KEY,
##             SENDGRID_API_KEY, SMTP_HOST, SMTP_USER, SMTP_PASS
##   Frontends: (none — all vars are build-time NEXT_PUBLIC_* passed here)
## ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Backend API (Express + TypeScript) ──────────────────────────────────
  - type: web
    name: lastmart-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: "https://lastmart.onrender.com,https://lastmart-vendor.onrender.com,https://lastmart-rider.onrender.com,https://lastmart-admin.onrender.com"
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_PATH
        value: /var/data/lastmart.db
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
    disk:
      name: lastmart-db
      mountPath: /var/data
      sizeGB: 1
    healthCheckPath: /api/health

  # ── 2. Customer Frontend (Next.js — port 3000) ────────────────────────────
  - type: web
    name: lastmart-customer
    runtime: node
    plan: starter
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_API_URL
        value: https://lastmart-api.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://lastmart.onrender.com
      - key: NEXT_PUBLIC_VENDOR_URL
        value: https://lastmart-vendor.onrender.com
      - key: NEXT_PUBLIC_RIDER_URL
        value: https://lastmart-rider.onrender.com
      - key: NEXT_PUBLIC_ADMIN_URL
        value: https://lastmart-admin.onrender.com
      - key: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
        sync: false

  # ── 3. Vendor Frontend (Next.js — port 3001) ─────────────────────────────
  - type: web
    name: lastmart-vendor
    runtime: node
    plan: starter
    rootDir: apps/vendor
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: BACKEND_URL
        value: https://lastmart-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://lastmart-api.onrender.com/api
      - key: NEXT_PUBLIC_CUSTOMER_URL
        value: https://lastmart.onrender.com

  # ── 4. Rider Frontend (Next.js — port 3002) ──────────────────────────────
  - type: web
    name: lastmart-rider
    runtime: node
    plan: starter
    rootDir: apps/rider
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: BACKEND_URL
        value: https://lastmart-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://lastmart-api.onrender.com/api
      - key: NEXT_PUBLIC_CUSTOMER_URL
        value: https://lastmart.onrender.com

  # ── 5. Admin Frontend (Next.js — port 3003) ──────────────────────────────
  - type: web
    name: lastmart-admin
    runtime: node
    plan: starter
    rootDir: apps/admin
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3003"
      - key: BACKEND_URL
        value: https://lastmart-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://lastmart-api.onrender.com/api
      - key: NEXT_PUBLIC_CUSTOMER_URL
        value: https://lastmart.onrender.com
