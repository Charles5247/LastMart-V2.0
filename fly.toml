# ─── Fly.io config — Frontend (Next.js) ──────────────────────────────────────
# Deploy: fly launch --config fly.toml (from repo root)
# Docs:   https://fly.io/docs/reference/configuration/

app            = "lastmart-frontend"
primary_region = "lhr"
kill_signal    = "SIGINT"
kill_timeout   = 30

[build]
  dockerfile = "Dockerfile"
  [build.args]
    BACKEND_API_URL = "https://lastmart-backend.fly.dev"

[env]
  NODE_ENV                 = "production"
  PORT                     = "3000"
  HOSTNAME                 = "0.0.0.0"
  NEXT_TELEMETRY_DISABLED  = "1"

# Set secret env vars:  fly secrets set BACKEND_API_URL=https://lastmart-backend.fly.dev
# fly secrets set NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=pk_live_...

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
