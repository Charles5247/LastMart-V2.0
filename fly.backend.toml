# ─── Fly.io config — Backend (Express API) ───────────────────────────────────
# Deploy: fly launch --config fly.backend.toml (from repo root)
# Or:     cd backend && fly launch
# Docs:   https://fly.io/docs/reference/configuration/

app            = "lastmart-backend"
primary_region = "lhr"
kill_signal    = "SIGINT"
kill_timeout   = 30

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "5000"

# Set secrets:  fly secrets set JWT_SECRET=... PAYSTACK_SECRET_KEY=... etc.
# fly secrets set FRONTEND_URL=https://lastmart-frontend.fly.dev

[http_service]
  internal_port       = 5000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

# Persistent volume for SQLite database
[mounts]
  source      = "lastmart_data"
  destination = "/data"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
